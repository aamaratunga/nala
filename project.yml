name: CoralApp
options:
  bundleIdPrefix: com.coral
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: "1.2.0"

targets:
  CoralApp:
    type: application
    platform: macOS
    sources:
      - CoralApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.coral.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        CODE_SIGN_ENTITLEMENTS: ""
        ENABLE_APP_SANDBOX: "NO"
        PRODUCT_NAME: Coral
    dependencies:
      - package: SwiftTerm
    info:
      path: CoralApp/Info.plist
      properties:
        CFBundleName: Coral
        CFBundleDisplayName: Coral
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "15.0"
        NSMainStoryboardFile: ""
