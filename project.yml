name: NalaApp
options:
  bundleIdPrefix: com.nala
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: "1.2.0"
  Lottie:
    url: https://github.com/airbnb/lottie-ios
    from: "4.6.0"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

targets:
  NalaApp:
    type: application
    platform: macOS
    sources:
      - NalaApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nala.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        CODE_SIGN_ENTITLEMENTS: NalaApp/NalaApp.entitlements
        ENABLE_APP_SANDBOX: "NO"
        PRODUCT_NAME: Nala
        PRODUCT_MODULE_NAME: Nala
    dependencies:
      - package: SwiftTerm
      - package: Lottie
      - package: Sparkle
    info:
      path: NalaApp/Info.plist
      properties:
        CFBundleName: Nala
        CFBundleDisplayName: Nala
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSMinimumSystemVersion: "15.0"
        NSMainStoryboardFile: ""
        SUFeedURL: "https://github.com/aamaratunga/nala/releases/latest/download/appcast.xml"
        SUPublicEDKey: "NHWJrRT8iCVCNckpsYSc+sxz4YElq8UVtHSyinBvOI0="
        SUEnableAutomaticChecks: true
        SUScheduledCheckInterval: 86400

  NalaAppTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - NalaAppTests
    dependencies:
      - target: NalaApp
    settings:
      base:
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        GENERATE_INFOPLIST_FILE: "YES"
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Nala.app/Contents/MacOS/Nala"

schemes:
  NalaApp:
    build:
      targets:
        NalaApp: all
        NalaAppTests: [test]
    test:
      targets:
        - NalaAppTests
